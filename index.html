<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Journal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Trading Journal for Nifty & Sensex</h1>
    
    <section id="settings">
        <h2>Settings</h2>
        <label for="workingCapital">Working Capital:</label>
        <input type="number" id="workingCapital" step="0.01">
        
        <label for="dayTarget">Day Target:</label>
        <input type="number" id="dayTarget" step="0.01">
        
        <label for="monthTarget">Month Target:</label>
        <input type="number" id="monthTarget" step="0.01">
        
        <button id="saveSettings">Save Settings</button>
    </section>
    
    <section id="addTrade">
        <h2>Add Trade</h2>
        <form id="tradeForm">
            <label for="tradeDate">Date:</label>
            <input type="date" id="tradeDate" required>
            
            <label for="capitalUsed">Capital Used:</label>
            <input type="number" id="capitalUsed" step="0.01" required>
            
            <label for="type">Type:</label>
            <select id="type" required>
                <option value="call">Call</option>
                <option value="put">Put</option>
            </select>
            
            <label for="profitLoss">Profit/Loss:</label>
            <input type="number" id="profitLoss" step="0.01" required>
            
            <label for="remark">Remark:</label>
            <textarea id="remark"></textarea>
            
            <button type="submit">Add Trade</button>
        </form>
    </section>
    
    <section id="trades">
        <h2>Trades</h2>
        <table id="tradesTable">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Capital Used</th>
                    <th>Type</th>
                    <th>Profit/Loss</th>
                    <th>Balance</th>
                    <th>Remark</th>
                </tr>
            </thead>
            <tbody id="tradesBody">
            </tbody>
        </table>
    </section>
    
    <script src="https://apis.google.com/js/api.js"></script>
    <script src="script.js"></script>
</body>
</html>
